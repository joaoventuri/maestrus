# [LEGADO] Snippet pra deploy fora do Docker. O setup ATUAL é Caddy + container
# (ver /opt/maestrus/Caddyfile.maestrus). Mantido aqui caso queira nginx puro:
# cole DENTRO do server block https de maestrus.cloud (porta 443, com TLS).
# Faz o upgrade WebSocket de wss://maestrus.cloud/relay → relay local em :8787.
location /relay {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;   # conexões longas (host fica plugado)
    proxy_send_timeout 3600s;
}
