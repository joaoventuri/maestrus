<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff8a3d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffb37a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="880" height="360" rx="18" fill="#0b0b0d"/>
  <rect width="880" height="360" rx="18" fill="none" stroke="#2a2a34" stroke-width="1"/>

  <!-- subtle grid -->
  <g stroke="#1a1a22" stroke-width="1">
    <line x1="0" y1="90"  x2="880" y2="90"/>
    <line x1="0" y1="180" x2="880" y2="180"/>
    <line x1="0" y1="270" x2="880" y2="270"/>
    <line x1="220" y1="0" x2="220" y2="360"/>
    <line x1="440" y1="0" x2="440" y2="360"/>
    <line x1="660" y1="0" x2="660" y2="360"/>
  </g>

  <!-- ═══ THE MAESTRO (center) ═══ -->
  <circle cx="440" cy="180" r="86" fill="url(#glow)">
    <animate attributeName="r" values="80;92;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="180" r="46" fill="#16161b" stroke="#ff8a3d" stroke-width="2.5"/>
  <circle cx="440" cy="180" r="46" fill="none" stroke="#ff8a3d" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="46;66" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- conductor: head + baton strokes -->
  <circle cx="440" cy="166" r="9" fill="#ff8a3d"/>
  <path d="M 428 196 Q 440 178 452 196" stroke="#ff8a3d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <g stroke="#ffb37a" stroke-width="2.5" stroke-linecap="round">
    <line x1="452" y1="176" x2="466" y2="160">
      <animateTransform attributeName="transform" type="rotate" values="-14 452 176; 16 452 176; -14 452 176" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>
  <text x="440" y="248" text-anchor="middle" fill="#ff8a3d" font-size="15" font-weight="700" letter-spacing="2">MAESTRUS</text>
  <text x="440" y="266" text-anchor="middle" fill="#9a9aa6" font-size="10.5">your self-hosted AI conductor</text>

  <!-- ═══ YOUR DEVICES (left) ═══ -->
  <g>
    <rect x="52" y="56" width="120" height="44" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <text x="112" y="76" text-anchor="middle" fill="#ededf0" font-size="12" font-weight="600">Browser</text>
    <text x="112" y="91" text-anchor="middle" fill="#65656f" font-size="9.5">any device</text>

    <rect x="52" y="158" width="120" height="44" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <text x="112" y="178" text-anchor="middle" fill="#ededf0" font-size="12" font-weight="600">Phone · PWA</text>
    <text x="112" y="193" text-anchor="middle" fill="#65656f" font-size="9.5">talk or type</text>

    <rect x="52" y="260" width="120" height="44" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <text x="112" y="280" text-anchor="middle" fill="#ededf0" font-size="12" font-weight="600">Desktop app</text>
    <text x="112" y="295" text-anchor="middle" fill="#65656f" font-size="9.5">Win · macOS · Linux</text>
  </g>

  <!-- device → maestro links (animated flow) -->
  <g stroke="#ff8a3d" stroke-width="1.6" fill="none" opacity="0.8">
    <path d="M 172 78 C 280 78 320 140 394 162" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" values="56;0" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 172 180 C 260 180 320 180 392 180" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" values="56;0" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M 172 282 C 280 282 320 220 394 198" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" values="56;0" dur="1.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ═══ YOUR PROJECTS (right) ═══ -->
  <g>
    <rect x="708" y="48" width="122" height="46" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <circle cx="726" cy="71" r="5" fill="#3dbf8c">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="742" y="68" fill="#ededf0" font-size="12" font-weight="600">backend-api</text>
    <text x="742" y="83" fill="#65656f" font-size="9.5">fixing tests…</text>

    <rect x="708" y="118" width="122" height="46" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <circle cx="726" cy="141" r="5" fill="#3dbf8c">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <text x="742" y="138" fill="#ededf0" font-size="12" font-weight="600">web-app</text>
    <text x="742" y="153" fill="#65656f" font-size="9.5">new feature…</text>

    <rect x="708" y="188" width="122" height="46" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <circle cx="726" cy="211" r="5" fill="#3dbf8c">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <text x="742" y="208" fill="#ededf0" font-size="12" font-weight="600">mobile-app</text>
    <text x="742" y="223" fill="#65656f" font-size="9.5">refactoring…</text>

    <rect x="708" y="258" width="122" height="46" rx="10" fill="#16161b" stroke="#2a2a34"/>
    <circle cx="726" cy="281" r="5" fill="#d8b657">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="742" y="278" fill="#ededf0" font-size="12" font-weight="600">infra</text>
    <text x="742" y="293" fill="#65656f" font-size="9.5">queued in kanban</text>
  </g>

  <!-- maestro → project beams (animated) -->
  <g stroke-width="2" fill="none">
    <path d="M 486 162 C 560 130 620 90 708 71" stroke="url(#beam)" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.0s" repeatCount="indefinite"/>
    </path>
    <path d="M 486 172 C 560 160 620 145 708 141" stroke="url(#beam)" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.35s" repeatCount="indefinite"/>
    </path>
    <path d="M 486 190 C 560 200 620 208 708 211" stroke="url(#beam)" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.15s" repeatCount="indefinite"/>
    </path>
    <path d="M 486 200 C 560 235 620 268 708 281" stroke="url(#beam)" stroke-dasharray="10 10" opacity="0.5">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- captions -->
  <text x="112" y="42" text-anchor="middle" fill="#9a9aa6" font-size="10" letter-spacing="1.5" font-weight="600">YOU, ANYWHERE</text>
  <text x="769" y="36" text-anchor="middle" fill="#9a9aa6" font-size="10" letter-spacing="1.5" font-weight="600">CLAUDE, WORKING 24/7</text>
  <text x="440" y="330" text-anchor="middle" fill="#65656f" font-size="10.5">one command · one port · your server · your Claude account</text>
</svg>
